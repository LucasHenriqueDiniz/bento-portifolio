<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Bento Portfolio showcase preview</title>
  <desc id="desc">A text-based SVG preview representing the Bento Portfolio interface with modular cards.</desc>
  <rect width="1600" height="900" rx="36" fill="#f7f4f1"/>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f28a68"/>
      <stop offset="1" stop-color="#d95f43"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111827" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.38"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="90" y="80" width="1420" height="740" rx="32" fill="#ffffff"/>
  </g>

  <text x="132" y="146" fill="#151515" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="800">Bento Portfolio</text>
  <text x="132" y="184" fill="#6b7280" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">React + Vite + Cloudflare Pages Functions</text>

  <g fill="#f9fafb" stroke="#e5e7eb" stroke-width="2">
    <rect x="132" y="230" width="330" height="230" rx="28"/>
    <rect x="488" y="230" width="610" height="230" rx="28"/>
    <rect x="1124" y="230" width="254" height="230" rx="28"/>
    <rect x="132" y="486" width="466" height="252" rx="28"/>
    <rect x="624" y="486" width="330" height="252" rx="28"/>
    <rect x="980" y="486" width="398" height="252" rx="28"/>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <text x="166" y="282" fill="#ef7658" font-size="16" font-weight="800" letter-spacing="4">ABOUT</text>
    <text x="166" y="328" fill="#111827" font-size="28" font-weight="800">Lucas Diniz</text>
    <text x="166" y="364" fill="#6b7280" font-size="19">Full-stack developer</text>
    <text x="166" y="410" fill="#374151" font-size="18">Personal dashboard, projects,</text>
    <text x="166" y="438" fill="#374151" font-size="18">resume, socials and live data.</text>

    <text x="522" y="282" fill="#ef7658" font-size="16" font-weight="800" letter-spacing="4">FEATURED PROJECT</text>
    <rect x="522" y="312" width="542" height="96" rx="20" fill="url(#dark)"/>
    <text x="548" y="350" fill="#111827" font-size="28" font-weight="800">DropCut</text>
    <text x="548" y="382" fill="#4b5563" font-size="18">Desktop app for compacting and cutting videos.</text>
    <rect x="930" y="424" width="134" height="36" rx="18" fill="url(#accent)"/>
    <text x="956" y="448" fill="#ffffff" font-size="15" font-weight="800">View project</text>

    <text x="1158" y="282" fill="#ef7658" font-size="16" font-weight="800" letter-spacing="4">MUSIC</text>
    <circle cx="1190" cy="338" r="26" fill="url(#accent)"/>
    <text x="1232" y="332" fill="#111827" font-size="20" font-weight="800">Top tracks</text>
    <text x="1232" y="362" fill="#6b7280" font-size="17">Last 90 days</text>
    <text x="1158" y="420" fill="#374151" font-size="18">Last.fm integration</text>

    <text x="166" y="540" fill="#ef7658" font-size="16" font-weight="800" letter-spacing="4">GITHUB</text>
    <text x="166" y="585" fill="#111827" font-size="40" font-weight="900">1,127</text>
    <text x="166" y="614" fill="#6b7280" font-size="18">contributions</text>
    <g fill="#35c46a">
      <rect x="166" y="648" width="18" height="18" rx="4"/><rect x="194" y="648" width="18" height="18" rx="4" opacity="0.35"/><rect x="222" y="648" width="18" height="18" rx="4" opacity="0.7"/><rect x="250" y="648" width="18" height="18" rx="4"/><rect x="278" y="648" width="18" height="18" rx="4" opacity="0.45"/>
      <rect x="166" y="676" width="18" height="18" rx="4" opacity="0.7"/><rect x="194" y="676" width="18" height="18" rx="4"/><rect x="222" y="676" width="18" height="18" rx="4" opacity="0.35"/><rect x="250" y="676" width="18" height="18" rx="4" opacity="0.65"/><rect x="278" y="676" width="18" height="18" rx="4"/>
    </g>

    <text x="658" y="540" fill="#ef7658" font-size="16" font-weight="800" letter-spacing="4">STACK</text>
    <text x="658" y="588" fill="#111827" font-size="25" font-weight="800">React · TypeScript</text>
    <text x="658" y="624" fill="#374151" font-size="19">Tailwind · Vite · Node</text>
    <text x="658" y="660" fill="#374151" font-size="19">Cloudflare · Supabase</text>

    <rect x="980" y="486" width="398" height="252" rx="28" fill="url(#accent)"/>
    <text x="1022" y="558" fill="#ffffff" font-size="16" font-weight="800" letter-spacing="4">RESUME</text>
    <text x="1022" y="620" fill="#ffffff" font-size="40" font-weight="900">Ver CV</text>
    <text x="1022" y="656" fill="#ffe3dc" font-size="19">Professional experience and education</text>
  </g>
</svg>
